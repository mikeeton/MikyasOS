name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Validate Prisma schema
        run: npx prisma validate --schema apps/api/prisma/schema.prisma

      - name: Generate Prisma client
        run: npm run prisma:generate -w @mikyasos/api

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        timeout-minutes: 5
        run: npm run lint

      - name: Unit tests
        timeout-minutes: 10
        run: npm test

      - name: Build
        timeout-minutes: 10
        run: npm run build

      - name: Dependency audit
        run: npm audit --omit=dev

      - name: Docker Compose config
        run: docker compose config

      - name: Bounded verification smoke
        run: npm run verify:bounded
